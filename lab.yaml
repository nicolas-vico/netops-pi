name: netops-basic

## Used specific Router and image because os raspberry pi 5's ARM Architecture

topology:
  nodes:
    r1:
      kind: linux
      image: quay.io/frrouting/frr:8.5.1
      exec:
        - sysctl -w net.ipv4.ip_forward=1
    
    r2:
      kind: linux
      image: quay.io/frrouting/frr:8.5.1
      exec:
        - sysctl -w net.ipv4.ip_forward=1

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]